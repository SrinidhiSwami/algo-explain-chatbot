<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlgoBot — Algorithm Explainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:        #F8FAFE;
  --surface:   #EFF4FB;
  --border:    #DFE9F9;
  --accent:    #AFCAF5;
  --accent-md: #6FA8EC;
  --accent-dk: #2E7DE9;
  --text:      #1A2640;
  --muted:     #6B80A0;
  --mono:      'DM Mono', monospace;
  --serif:     'DM Serif Display', serif;
  --sans:      'Outfit', sans-serif;
  --r:         14px;
  --shadow:    0 2px 16px rgba(46,125,233,0.08);
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── HEADER ──────────────────────────────────────────── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.logo {
  width: 36px; height: 36px;
  background: var(--accent-dk);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  box-shadow: 0 3px 10px rgba(46,125,233,0.3);
  flex-shrink: 0;
}
header h1 {
  font-family: var(--serif);
  font-size: 1.25rem;
  letter-spacing: -0.02em;
}
header h1 span { font-family: var(--sans); font-size: 0.72rem; font-weight: 400; color: var(--muted); margin-left: 6px; }
.badge {
  margin-left: auto;
  font-size: 0.72rem; font-weight: 500;
  color: var(--muted);
  background: var(--surface);
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
}

/* ── CHAT CONTAINER ──────────────────────────────────── */
#chatWrap {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.inner { max-width: 760px; margin: 0 auto; width: 100%; padding: 0 20px; }

/* ── WELCOME ─────────────────────────────────────────── */
#welcome {
  text-align: center;
  padding: 40px 20px;
  animation: fadeUp .5s ease both;
}
#welcome h2 {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 10px;
}
#welcome h2 em { color: var(--accent-dk); font-style: italic; }
#welcome p { color: var(--muted); font-weight: 300; font-size: .95rem; margin-bottom: 24px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  padding: 7px 16px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: .8rem; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
}
.chip:hover { border-color: var(--accent-md); color: var(--accent-dk); background: var(--surface); }

/* ── MESSAGE ROWS ────────────────────────────────────── */
.msg-row {
  display: flex;
  gap: 12px;
  animation: fadeUp .35s ease both;
}
.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 14px;
  flex-shrink: 0;
  align-self: flex-end;
}
.avatar.bot  { background: var(--accent-dk); color: #fff; box-shadow: 0 2px 8px rgba(46,125,233,.3); }
.avatar.user { background: var(--surface); border: 1.5px solid var(--border); }

/* ── USER BUBBLE ─────────────────────────────────────── */
.user-bubble {
  background: var(--accent-dk);
  color: #fff;
  padding: 12px 18px;
  border-radius: 18px 18px 4px 18px;
  font-size: .92rem;
  font-weight: 400;
  max-width: 70%;
  line-height: 1.5;
  box-shadow: 0 3px 12px rgba(46,125,233,.25);
}

/* ── BOT BUBBLE (follow-up) ──────────────────────────── */
.bot-bubble {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 18px 18px 18px 4px;
  padding: 14px 20px;
  font-size: .92rem;
  line-height: 1.7;
  color: var(--text);
  max-width: 80%;
  width: fit-content;
  word-break: break-word;
  box-shadow: var(--shadow);
  white-space: pre-wrap;
  font-weight: 300;
}
.bot-bubble pre {
  font-family: var(--mono);
  font-size: .8rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-top: 10px;
  overflow-x: auto;
  white-space: pre;
}

.msg-content{
  max-width: calc(100% - 44px);
  min-width: 0;
}

/* ── EXPLANATION CARD ────────────────────────────────── */
.expl-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 18px 18px 18px 4px;
  overflow: hidden;
  box-shadow: var(--shadow);
  max-width: 92%;
}

/* theory section */
.expl-theory {
  padding: 22px 26px 18px;
  border-bottom: 1px solid var(--border);
}
.expl-algo-name {
  font-family: var(--serif);
  font-size: 1.3rem;
  letter-spacing: -.02em;
  margin-bottom: 10px;
}
.expl-theory p { color: var(--muted); font-size: .88rem; line-height: 1.75; font-weight: 300; }
.example-pill {
  display: inline-block;
  margin-top: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 14px;
  font-size: .78rem;
  color: var(--accent-dk);
  font-weight: 500;
}

/* steps */
.expl-steps { padding: 16px 26px; border-bottom: 1px solid var(--border); }
.steps-lbl {
  font-size: .68rem; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.steps-counter { font-size: .75rem; font-weight: 500; background: var(--surface); padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); }

.step-item {
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity .4s ease, transform .4s ease;
}
.step-item:last-child { margin-bottom: 0; }
.step-item.show { opacity: 1; transform: translateY(0); }

.step-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.step-n {
  width: 24px; height: 24px;
  background: var(--accent-dk); color: #fff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: .72rem; font-weight: 700;
  font-family: var(--mono); flex-shrink: 0;
}
.step-ttl { font-size: .88rem; font-weight: 600; }

.step-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.vis-lbl { font-size: .65rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.vis-block {
  font-family: var(--mono); font-size: .78rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  white-space: pre; overflow-x: auto; line-height: 1.6;
}
.step-expl { font-size: .85rem; color: var(--muted); line-height: 1.7; font-weight: 300; }

/* summary */
.expl-summary {
  background: var(--accent-dk);
  color: #fff;
  padding: 18px 26px;
  opacity: 0;
  transition: opacity .5s ease;
}
.expl-summary.show { opacity: 1; }
.expl-summary h4 { font-family: var(--serif); font-size: 1rem; margin-bottom: 8px; }
.expl-summary p { font-size: .85rem; line-height: 1.7; opacity: .88; font-weight: 300; }

/* ── TYPING INDICATOR ────────────────────────────────── */
.typing { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
.dot { width: 7px; height: 7px; background: var(--accent-md); border-radius: 50%; animation: bounce .9s infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .30s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── INPUT BAR ───────────────────────────────────────── */
#inputBar {
  flex-shrink: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  padding: 14px 20px;
}
.input-inner {
  max-width: 760px; margin: 0 auto;
  display: flex; gap: 10px; align-items: flex-end;
}
#msgInput {
  flex: 1;
  padding: 13px 18px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: var(--sans);
  font-size: .93rem; font-weight: 400;
  background: var(--bg);
  color: var(--text);
  outline: none;
  resize: none;
  line-height: 1.5;
  max-height: 120px;
  overflow-y: auto;
  transition: border .2s, box-shadow .2s;
}
#msgInput::placeholder { color: var(--muted); }
#msgInput:focus { border-color: var(--accent-md); box-shadow: 0 0 0 3px rgba(111,168,236,.15); }

#sendBtn {
  width: 46px; height: 46px;
  background: var(--accent-dk);
  border: none; border-radius: 12px;
  color: #fff; font-size: 18px;
  cursor: pointer; flex-shrink: 0;
  display: grid; place-items: center;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 3px 10px rgba(46,125,233,.3);
}
#sendBtn:hover { background: #2066cc; box-shadow: 0 5px 16px rgba(46,125,233,.4); }
#sendBtn:active { transform: scale(.94); }
#sendBtn:disabled { background: var(--accent); box-shadow: none; cursor: not-allowed; }

/* ── UTILS ───────────────────────────────────────────── */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🤖</div>
  <h1>AlgoBot <span>Algorithm Explainer</span></h1>
  <div class="badge">LLaMA 3 · Groq</div>
</header>

<!-- CHAT AREA -->
<div id="chatWrap">
  <div class="inner">

    <!-- WELCOME -->
    <div id="welcome">
      <h2>Learn any algorithm,<br/><em>ask anything.</em></h2>
      <p>Ask for an explanation, then ask follow-up questions freely.<br/>Everything stays in one conversation.</p>
      <div class="chips">
        <div class="chip" onclick="quick('Explain Bubble Sort')">Bubble Sort</div>
        <div class="chip" onclick="quick('Explain Binary Search')">Binary Search</div>
        <div class="chip" onclick="quick('Explain Merge Sort')">Merge Sort</div>
        <div class="chip" onclick="quick('Explain BFS')">BFS</div>
        <div class="chip" onclick="quick('Explain Dijkstra')">Dijkstra</div>
        <div class="chip" onclick="quick('Explain Quick Sort')">Quick Sort</div>
        <div class="chip" onclick="quick('Explain Dynamic Programming')">Dynamic Programming</div>
        <div class="chip" onclick="quick('Explain Inorder Tree Traversal')">Inorder Traversal</div>
      </div>
    </div>

  </div>
</div>

<!-- INPUT BAR -->
<div id="inputBar">
  <div class="input-inner">
    <textarea id="msgInput" rows="1" placeholder="Ask about an algorithm, or ask a follow-up question…"></textarea>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>
const history = [];
let busy = false;

// ── AUTO-RESIZE TEXTAREA ────────────────────────────────
const inp = document.getElementById('msgInput');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function quick(text) {
  inp.value = text;
  send();
}

// ── SCROLL TO BOTTOM ────────────────────────────────────
function scrollBottom() {
  const wrap = document.getElementById('chatWrap');
  wrap.scrollTop = wrap.scrollHeight;
}

// ── ADD MESSAGE ROW ─────────────────────────────────────
function addRow(role) {
  const wrap = document.getElementById('chatWrap');
  const inner = document.createElement('div');
  inner.className = 'inner';

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'bot' ? '🤖' : '👤';

  const content = document.createElement('div');
  content.className = 'msg-content';

  row.appendChild(av);
  row.appendChild(content);
  inner.appendChild(row);
  wrap.appendChild(inner);
  scrollBottom();
  return content;
}

// ── TYPING INDICATOR ────────────────────────────────────
function showTyping() {
  const slot = addRow('bot');
  const bubble = document.createElement('div');
  bubble.className = 'bot-bubble typing-wrap';
  bubble.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  slot.appendChild(bubble);
  scrollBottom();
  return bubble;
}

// ── RENDER USER BUBBLE ──────────────────────────────────
function renderUser(text) {
  const slot = addRow('user');
  const bub = document.createElement('div');
  bub.className = 'user-bubble';
  bub.textContent = text;
  slot.appendChild(bub);
  scrollBottom();
}

// ── RENDER FOLLOW-UP BOT REPLY ──────────────────────────
function renderFollowup(text, target) {
  target.className = 'bot-bubble';
  // detect ascii blocks (lines with [] or -> or | patterns)
  const lines = text.split('\n');
  let html = '', inBlock = false, block = '';

  for (const line of lines) {
    const isCode = /[\[\]|+\-]{2,}|->|<-|\^/.test(line) && line.trim().length > 0;
    if (isCode) {
      if (!inBlock) { inBlock = true; block = ''; }
      block += escHtml(line) + '\n';
    } else {
      if (inBlock) {
        html += `<pre>${block.trimEnd()}</pre>`;
        inBlock = false; block = '';
      }
      html += escHtml(line) + '\n';
    }
  }
  if (inBlock) html += `<pre>${block.trimEnd()}</pre>`;
  target.innerHTML = html;
  scrollBottom();
}

// ── RENDER EXPLANATION CARD ─────────────────────────────
function renderExplanation(data, algo, target) {
  target.className = '';
  const card = document.createElement('div');
  card.className = 'expl-card';

  // Theory
  const theory = document.createElement('div');
  theory.className = 'expl-theory';
  theory.innerHTML = `
    <div class="expl-algo-name">${escHtml(algo)}</div>
    <p>${escHtml(data.theory)}</p>
    ${data.example_intro ? `<div class="example-pill">🎯 ${escHtml(data.example_intro)}</div>` : ''}
  `;
  card.appendChild(theory);

  // Steps wrapper
  const stepsWrap = document.createElement('div');
  stepsWrap.className = 'expl-steps';
  const total = data.steps.length;
  stepsWrap.innerHTML = `
    <div class="steps-lbl">
      Step-by-step walkthrough
      <span class="steps-counter" id="sc">0 / ${total}</span>
    </div>`;

  data.steps.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'step-item';
    item.id = `si-${Date.now()}-${i}`;
    item.innerHTML = `
      <div class="step-hdr">
        <div class="step-n">${i+1}</div>
        <div class="step-ttl">${escHtml(s.title)}</div>
      </div>
      <div class="step-body">
        <div>
          <div class="vis-lbl">Visual</div>
          <div class="vis-block">${escHtml(s.visual)}</div>
        </div>
        <div class="step-expl">${escHtml(s.explanation)}</div>
      </div>`;
    stepsWrap.appendChild(item);
  });
  card.appendChild(stepsWrap);

  // Summary
  const sum = document.createElement('div');
  sum.className = 'expl-summary';
  sum.id = `sum-${Date.now()}`;
  sum.innerHTML = `<h4>Key Takeaways</h4><p>${escHtml(data.summary)}</p>`;
  card.appendChild(sum);

  target.appendChild(card);
  scrollBottom();

  // Animate steps in
  const stepEls = stepsWrap.querySelectorAll('.step-item');
  const sc      = stepsWrap.querySelector('.steps-counter');
  let idx = 0;

  function nextStep() {
    if (idx >= stepEls.length) {
      setTimeout(() => { sum.classList.add('show'); scrollBottom(); }, 300);
      return;
    }
    setTimeout(() => {
      stepEls[idx].classList.add('show');
      sc.textContent = `${idx+1} / ${total}`;
      scrollBottom();
      idx++;
      nextStep();
    }, idx === 0 ? 300 : 1100);
  }
  nextStep();
}

// ── SEND ────────────────────────────────────────────────
async function send() {
  if (busy) return;
  const text = inp.value.trim();
  if (!text) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  inp.value = '';
  inp.style.height = 'auto';

  renderUser(text);
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  const typingBubble = showTyping();

  // Save user turn
  history.push({ role: 'user', content: text });

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) })
    });
    const json = await res.json();

    if (!res.ok || json.error) {
      renderFollowup('⚠ ' + (json.error || 'Something went wrong.'), typingBubble);
      return;
    }

    const data = json.data;
    history.push({ role: 'assistant', content: data.raw });

    if (data.type === 'explanation') {
      renderExplanation(data, text.replace(/explain\s+/i, ''), typingBubble);
    } else {
      renderFollowup(data.text, typingBubble);
    }

  } catch (e) {
    renderFollowup('⚠ Cannot connect to server. Is app.py running?', typingBubble);
  } finally {
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
